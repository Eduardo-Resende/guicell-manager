
<style>
#erd-wrap { padding: 8px 0; }
#erd svg { width: 100%; height: auto; }
#erd-footer { font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-top: 8px; font-family: var(--font-sans); }
</style>
<h2 class="sr-only">Diagrama Entidade-Relacionamento — Guicell Manager (9 tabelas normalizadas até 3FN)</h2>
<div id="erd-wrap">
  <div id="erd"></div>
  <p id="erd-footer">Fonte: Elaborado pelos autores (2026)</p>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f0eeea',
    primaryBorderColor: dark ? '#5a5856' : '#9a9890',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    edgeLabelBackground: dark ? '#1e1e1c' : '#fafaf8',
  },
});

const diagram = `erDiagram
  clientes {
    INT id_cliente PK
    VARCHAR nome
    VARCHAR cpf_cnpj "UNIQUE"
    VARCHAR telefone
    VARCHAR email
    VARCHAR endereco
    DATETIME criado_em
  }
  aparelhos {
    INT id_aparelho PK
    INT id_cliente FK
    VARCHAR marca
    VARCHAR modelo
    VARCHAR imei "UNIQUE"
    TEXT observacoes
  }
  usuarios {
    INT id_usuario PK
    VARCHAR nome
    VARCHAR login "UNIQUE"
    VARCHAR senha_hash
    ENUM perfil
    BOOLEAN ativo
    DATETIME criado_em
  }
  ordens_servico {
    INT id_os PK
    VARCHAR numero_os "UNIQUE"
    INT id_cliente FK
    INT id_aparelho FK
    INT id_tecnico FK
    TEXT defeito_relatado
    TEXT diagnostico
    ENUM status
    DECIMAL valor_orcado
    DECIMAL valor_final
    VARCHAR forma_pagamento
    DATETIME data_abertura
    DATETIME data_fechamento
    DATE prazo_estimado
  }
  produtos {
    INT id_produto PK
    VARCHAR descricao
    VARCHAR categoria
    INT estoque_atual
    INT estoque_minimo
    DECIMAL valor_custo
    DECIMAL valor_venda
  }
  itens_os {
    INT id_item_os PK
    INT id_os FK
    INT id_produto FK
    INT quantidade
    DECIMAL valor_unitario
  }
  vendas {
    INT id_venda PK
    INT id_cliente FK
    INT id_usuario FK
    DATETIME data_venda
    DECIMAL valor_total
    VARCHAR forma_pagamento
    DECIMAL desconto
  }
  itens_venda {
    INT id_item_venda PK
    INT id_venda FK
    INT id_produto FK
    INT quantidade
    DECIMAL valor_unitario
  }
  caixa {
    INT id_caixa PK
    INT id_usuario FK
    DATETIME data
    ENUM tipo
    DECIMAL valor
    VARCHAR descricao
    VARCHAR categoria
    INT id_os FK
    INT id_venda FK
  }

  clientes ||--o{ aparelhos : "possui"
  clientes ||--o{ ordens_servico : "tem"
  clientes ||--o{ vendas : "realiza"
  aparelhos ||--o{ ordens_servico : "de"
  usuarios ||--o{ ordens_servico : "executa"
  usuarios ||--o{ vendas : "registra"
  usuarios ||--o{ caixa : "lanca"
  ordens_servico ||--o{ itens_os : "contem"
  ordens_servico ||--o| caixa : "gera"
  produtos ||--o{ itens_os : "em"
  vendas ||--o{ itens_venda : "contem"
  vendas ||--o| caixa : "gera"
  produtos ||--o{ itens_venda : "em"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
